#!/usr/bin/env bash
# org.conf — GitHub organisation list for fetch-reviews.sh's org-scoped
# review queries. This re-runs the user-review-requested/reviewed-by/
# commenter queries fetch-reviews.sh already runs against repos.conf's REPOS
# list, but scoped to whole orgs instead. Every match from this pass routes
# to My Reviews only — it never widens Team Reviews or Bots. Deliberately
# excludes review-requested:@me (which also matches team-based requests) —
# the org-scoped pass only catches PRs where YOU personally are the
# requested/engaged reviewer, not PRs requested from a team you belong to.
#
# Add "org" slugs, one per line:
#
# ORGS=(
#   "myorg"
#   "another-org"
# )
ORGS=()
